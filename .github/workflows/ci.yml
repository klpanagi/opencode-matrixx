name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Block PRs targeting master branch
  block-master-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR target branch
        run: |
          if [ "${{ github.base_ref }}" = "master" ]; then
            echo "::error::PRs to master branch are not allowed. Please target the 'dev' branch instead."
            echo ""
            echo "PULL REQUESTS TO MASTER ARE BLOCKED"
            echo ""
            echo "All PRs must target the 'dev' branch."
            echo "Please close this PR and create a new one targeting 'dev'."
            exit 1
          else
            echo "PR targets '${{ github.base_ref }}' branch - OK"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Run mock-heavy tests (isolated)
        run: |
          # These files use mock.module() which pollutes bun's module cache
          # when run in parallel. Each invocation runs in a separate process.
          #
          # Directories (all test files within run together, isolated from other dirs)
          bun test src/plugin-handlers
          bun test src/hooks/compaction-context-injector
          bun test src/features/tmux-subagent
          #
          # Individual files that use mock.module and cause cross-file pollution
          bun test src/cli/doctor/formatter.test.ts
          bun test src/cli/doctor/format-default.test.ts
          bun test src/tools/delegate-agent/sync-executor.test.ts
          bun test src/tools/delegate-agent/session-creator.test.ts
          bun test src/features/opencode-skill-loader/loader.test.ts
          bun test src/features/opencode-skill-loader/agents-skills-global.test.ts
          bun test src/tools/session-manager/storage.test.ts
          bun test src/hooks/prometheus-md-only/index.test.ts
          bun test src/hooks/architect/index.test.ts
          bun test src/hooks/matrix-loop/index.test.ts
          bun test src/hooks/start-work/index.test.ts
          bun test src/hooks/auto-update-checker/hook/background-update-check.test.ts
          bun test src/hooks/auto-update-checker/hook.test.ts
          bun test src/features/skill-mcp-manager/manager.test.ts
          bun test src/features/background-agent/manager.test.ts
          bun test src/hooks/comment-checker/cli.test.ts
          bun test src/hooks/comment-checker/hook.apply-patch.test.ts
          bun test src/hooks/directory-agents-injector/injector.test.ts
          bun test src/hooks/directory-readme-injector/injector.test.ts
          bun test src/hooks/rules-injector/injector.test.ts
          bun test src/hooks/compaction-todo-preserver/index.test.ts
          bun test src/hooks/preemptive-compaction.test.ts
          bun test src/hooks/claude-code-hooks/stop.test.ts
          bun test src/tools/lsp/client.test.ts
          bun test src/tools/skill/tools.test.ts
          bun test src/features/claude-code-mcp-loader/loader.test.ts
          bun test src/hooks/anthropic-context-window-limit-recovery/empty-content-recovery-sdk.test.ts
          bun test src/hooks/anthropic-context-window-limit-recovery/recovery-deduplication.test.ts
          bun test src/hooks/anthropic-context-window-limit-recovery/recovery-hook.test.ts
          bun test src/hooks/anthropic-context-window-limit-recovery/storage.test.ts
          bun test src/cli/run/integration.test.ts
          bun test src/cli/run/server-connection.test.ts
          bun test src/cli/mcp-oauth/login.test.ts
          # OPENCODE_CONFIG_DIR env var pollution — must run isolated to prevent
          # parallel test interference from other files that modify this global var
          bun test src/cli/config-manager/auth-plugins.test.ts

      - name: Run remaining tests
        run: |
          # Run all other tests together. The mock-heavy files above are excluded
          # via --exclude patterns to prevent double-running and pollution.
          find src bin script -name '*.test.ts' -type f \
            | grep -v -F \
              -e 'src/plugin-handlers/' \
              -e 'src/hooks/compaction-context-injector/' \
              -e 'src/features/tmux-subagent/' \
              -e 'src/cli/doctor/formatter.test.ts' \
              -e 'src/cli/doctor/format-default.test.ts' \
              -e 'src/tools/delegate-agent/sync-executor.test.ts' \
              -e 'src/tools/delegate-agent/session-creator.test.ts' \
              -e 'src/features/opencode-skill-loader/loader.test.ts' \
              -e 'src/features/opencode-skill-loader/agents-skills-global.test.ts' \
              -e 'src/tools/session-manager/storage.test.ts' \
              -e 'src/hooks/prometheus-md-only/index.test.ts' \
              -e 'src/hooks/architect/index.test.ts' \
              -e 'src/hooks/matrix-loop/index.test.ts' \
              -e 'src/hooks/start-work/index.test.ts' \
              -e 'src/hooks/auto-update-checker/hook/background-update-check.test.ts' \
              -e 'src/hooks/auto-update-checker/hook.test.ts' \
              -e 'src/features/skill-mcp-manager/manager.test.ts' \
              -e 'src/features/background-agent/manager.test.ts' \
              -e 'src/hooks/comment-checker/cli.test.ts' \
              -e 'src/hooks/comment-checker/hook.apply-patch.test.ts' \
              -e 'src/hooks/directory-agents-injector/injector.test.ts' \
              -e 'src/hooks/directory-readme-injector/injector.test.ts' \
              -e 'src/hooks/rules-injector/injector.test.ts' \
              -e 'src/hooks/compaction-todo-preserver/index.test.ts' \
              -e 'src/hooks/preemptive-compaction.test.ts' \
              -e 'src/hooks/claude-code-hooks/stop.test.ts' \
              -e 'src/tools/lsp/client.test.ts' \
              -e 'src/tools/skill/tools.test.ts' \
              -e 'src/features/claude-code-mcp-loader/loader.test.ts' \
              -e 'src/hooks/anthropic-context-window-limit-recovery/empty-content-recovery-sdk.test.ts' \
              -e 'src/hooks/anthropic-context-window-limit-recovery/recovery-deduplication.test.ts' \
              -e 'src/hooks/anthropic-context-window-limit-recovery/recovery-hook.test.ts' \
              -e 'src/hooks/anthropic-context-window-limit-recovery/storage.test.ts' \
              -e 'src/cli/run/integration.test.ts' \
              -e 'src/cli/run/server-connection.test.ts' \
              -e 'src/cli/mcp-oauth/login.test.ts' \
              -e 'src/cli/config-manager/auth-plugins.test.ts' \
            | xargs bun test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Type check
        run: bun run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Lint
        run: bun run lint

  build:
    runs-on: ubuntu-latest
    needs: [test, typecheck, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "ERROR: dist/index.js not found!" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts not found!" && exit 1)

      - name: Auto-commit schema changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if git diff --quiet assets/matrixx.schema.json; then
            echo "No schema changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/matrixx.schema.json
            git commit -m "chore: auto-update schema.json"
            git push
          fi

  draft-release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(bun run script/generate-changelog.ts)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update draft release
        run: |
          EXISTING_DRAFT=$(gh release list --json tagName,isDraft --jq '.[] | select(.isDraft == true and .tagName == "next") | .tagName')
          
          if [ -n "$EXISTING_DRAFT" ]; then
            echo "Updating existing draft release..."
            gh release edit next \
              --title "Upcoming Changes 🍿" \
              --notes-file - \
              --draft <<'EOF'
          ${{ steps.notes.outputs.notes }}
          EOF
          else
            echo "Creating new draft release..."
            gh release create next \
              --title "Upcoming Changes 🍿" \
              --notes-file - \
              --draft \
              --target ${{ github.sha }} <<'EOF'
          ${{ steps.notes.outputs.notes }}
          EOF
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: publish
run-name: "${{ format('release {0}', inputs.version || inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (e.g., 3.0.0-beta.6). Takes precedence over bump."
        required: false
        type: string
      skip_platform:
        description: "Skip platform binary packages"
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Run mock-heavy tests (isolated)
        run: |
          # These files use mock.module() which pollutes the module cache.
          # Each runs in its own bun test invocation to prevent cross-contamination.

          # --- Plugin handlers & original isolated ---
          bun test src/plugin-handlers
          bun test src/hooks/compaction-context-injector
          bun test src/features/tmux-subagent
          bun test src/cli/doctor/formatter.test.ts
          bun test src/cli/doctor/format-default.test.ts
          bun test src/tools/delegate-agent/sync-executor.test.ts
          bun test src/tools/delegate-agent/session-creator.test.ts
          bun test src/features/opencode-skill-loader/loader.test.ts

          # --- Hook directories that use mock.module() ---
          bun test src/hooks/architect
          bun test src/hooks/claude-code-hooks
          bun test src/hooks/comment-checker
          bun test src/hooks/compaction-todo-preserver
          bun test src/hooks/directory-agents-injector
          bun test src/hooks/directory-readme-injector
          bun test src/hooks/prometheus-md-only
          bun test src/hooks/rules-injector

          # --- Non-hook files that use mock.module() ---
          bun test src/cli/doctor/runner.test.ts
          bun test src/shared/opencode-message-dir.test.ts
          bun test src/cli/run/integration.test.ts
          bun test src/cli/run/server-connection.test.ts
          bun test src/cli/mcp-oauth/login.test.ts
          bun test src/features/background-agent/manager.test.ts
          # OPENCODE_CONFIG_DIR env var pollution — must run isolated to prevent
          # parallel test interference from other files that modify this global var
          bun test src/cli/config-manager/auth-plugins.test.ts

      - name: Run remaining tests
        run: |
          # Only pure (non-mock.module) test files/dirs run together here.
          # Excluded: mock.module files (run isolated above), pre-existing failures.
          # Pre-existing failures excluded:
          #   src/shared/model-requirements.test.ts (stale model expectations)
          #   src/cli/config-manager.test.ts (stale model expectation)
          #   src/cli/model-fallback.test.ts (stale model snapshots, 13 fail)
          #   src/hooks/anthropic-context-window-limit-recovery (CI-only failures, bun version)
          #   src/hooks/todo-continuation-enforcer (7 fail)
          #   src/hooks/auto-update-checker (4 fail)
          #   src/hooks/context-window-monitor.test.ts (2 fail)
          #   src/hooks/preemptive-compaction.test.ts (3 fail)
          #   src/agents/utils.test.ts (CI-only failures: stale model expectations after merovingian model refactor; passes locally)
          bun test bin script src/config src/mcp src/index.test.ts \
            src/agents/builtin-agents/resolve-file-uri.test.ts \
            src/agents/cipher.test.ts \
            src/agents/dynamic-agent-prompt-builder.test.ts \
            src/agents/momus.test.ts \
            src/agents/mouse/index.test.ts \
            src/agents/oracle-prompt.test.ts \
            src/agents/types.test.ts \
            src/shared/agent-config-integration.test.ts \
            src/shared/agent-display-names.test.ts \
            src/shared/agent-variant.test.ts \
            src/shared/claude-config-dir.test.ts \
            src/shared/connected-providers-cache.test.ts \
            src/shared/deep-merge.test.ts \
            src/shared/external-plugin-detector.test.ts \
            src/shared/file-utils.test.ts \
            src/shared/first-message-variant.test.ts \
            src/shared/frontmatter.test.ts \
            src/shared/git-worktree \
            src/shared/jsonc-parser.test.ts \
            src/shared/merge-categories.test.ts \
            src/shared/migration.test.ts \
            src/shared/model-availability.test.ts \
            src/shared/model-resolver.test.ts \
            src/shared/model-suggestion-retry.test.ts \
            src/shared/normalize-sdk-response.test.ts \
            src/shared/opencode-config-dir.test.ts \
            src/shared/opencode-http-api.test.ts \
            src/shared/opencode-server-auth.test.ts \
            src/shared/opencode-storage-detection.test.ts \
            src/shared/opencode-version.test.ts \
            src/shared/pattern-matcher.test.ts \
            src/shared/permission-compat.test.ts \
            src/shared/port-utils.test.ts \
            src/shared/safe-create-hook.test.ts \
            src/shared/session-cursor.test.ts \
            src/shared/session-directory-resolver.test.ts \
            src/shared/session-tools-store.test.ts \
            src/shared/shell-env.test.ts \
            src/shared/skill-path-resolver.test.ts \
            src/shared/system-directive.test.ts \
            src/shared/tmux \
            src/shared/tool-name.test.ts \
            src/shared/truncate-description.test.ts \
            src/cli/run/completion.test.ts \
            src/cli/run/event-handlers.test.ts \
            src/cli/run/events.test.ts \
            src/cli/run/json-output.test.ts \
            src/cli/run/on-complete-hook.test.ts \
            src/cli/run/opencode-binary-resolver.test.ts \
            src/cli/run/opencode-bin-path.test.ts \
            src/cli/run/poll-for-completion.test.ts \
            src/cli/run/runner.test.ts \
            src/cli/run/session-resolver.test.ts \
            src/cli/config-manager/add-provider-config.test.ts \
            src/cli/mcp-oauth/index.test.ts \
            src/cli/mcp-oauth/logout.test.ts \
            src/cli/mcp-oauth/status.test.ts \
            src/cli/index.test.ts src/cli/install.test.ts \
            src/cli/doctor/checks \
            src/tools/ast-grep src/tools/background-task src/tools/delegate-task \
            src/tools/glob src/tools/grep src/tools/hashline-edit src/tools/interactive-bash \
            src/tools/look-at \
            src/tools/lsp/lsp-process.test.ts \
            src/tools/lsp/server-config-loader.test.ts \
            src/tools/lsp/utils.test.ts \
            src/tools/lsp/config.test.ts \
            src/tools/session-manager/tools.test.ts \
            src/tools/session-manager/utils.test.ts \
            src/tools/skill-mcp src/tools/slashcommand src/tools/task \
            src/tools/delegate-agent/background-agent-executor.test.ts \
            src/tools/delegate-agent/background-executor.test.ts \
            src/tools/delegate-agent/subagent-session-creator.test.ts \
            src/hooks/anthropic-effort \
            src/hooks/auto-slash-command \
            src/hooks/category-skill-reminder \
            src/hooks/delegate-task-retry \
            src/hooks/edit-error-recovery \
            src/hooks/env-file-write-guard \
            src/hooks/handoff-injector \
            src/hooks/hashline-read-enhancer \
            src/hooks/keyword-detector \
            src/hooks/matrix-loop \
            src/hooks/non-interactive-env \
            src/hooks/question-label-truncator \
            src/hooks/secret-leak-guard \
            src/hooks/session-recovery \
            src/hooks/start-work \
            src/hooks/stop-continuation-guard \
            src/hooks/task-reminder \
            src/hooks/task-resume-info \
            src/hooks/tasks-todowrite-disabler \
            src/hooks/think-mode \
            src/hooks/unstable-agent-babysitter \
            src/hooks/write-existing-file-guard \
            src/hooks/session-notification.test.ts \
            src/hooks/tool-output-truncator.test.ts \
            src/features/background-agent/manager.polling.test.ts \
            src/features/background-agent/task-poller.test.ts \
            src/features/background-agent/parent-session-notifier.test.ts \
            src/features/background-agent/concurrency.test.ts \
            src/features/background-agent/task-history.test.ts \
            src/features/builtin-commands \
            src/features/builtin-skills \
            src/features/claude-code-session-state \
            src/features/hook-message-injector \
            src/features/opencode-skill-loader/config-source-discovery.test.ts \
            src/features/opencode-skill-loader/merger.test.ts \
            src/features/opencode-skill-loader/skill-content.test.ts \
            src/features/opencode-skill-loader/blocking.test.ts \
            src/features/opencode-skill-loader/async-loader.test.ts \
            src/features/skill-mcp-manager/env-cleaner.test.ts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Type check
        run: bun run typecheck

  publish-main:
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.repository == 'klpanagi/matrixx'
    outputs:
      version: ${{ steps.version.outputs.version }}
      dist_tag: ${{ steps.version.outputs.dist_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Calculate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            PREV=$(curl -s https://registry.npmjs.org/opencode-matrixx/latest | jq -r '.version // "0.0.0"' 2>/dev/null || echo "0.0.0")
            BASE="${PREV%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            case "${{ inputs.bump }}" in
              major) VERSION="$((MAJOR+1)).0.0" ;;
              minor) VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              *) VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == *"-"* ]]; then
            DIST_TAG=$(echo "$VERSION" | cut -d'-' -f2 | cut -d'.' -f1)
            echo "dist_tag=${DIST_TAG:-next}" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=" >> $GITHUB_OUTPUT
          fi
          
          echo "Version: $VERSION"

      - name: Check if already published
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/opencode-matrixx/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ opencode-matrixx@${VERSION} already published"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 linux-x64-musl linux-arm64-musl windows-x64; do
            jq --arg v "$VERSION" '.version = $v' "packages/${platform}/package.json" > tmp.json
            mv tmp.json "packages/${platform}/package.json"
          done
          
          jq --arg v "$VERSION" '.optionalDependencies = (.optionalDependencies | to_entries | map(.value = $v) | from_entries)' package.json > tmp.json && mv tmp.json package.json

      - name: Build main package
        if: steps.check.outputs.skip != 'true'
        run: |
          bun build src/index.ts --outdir dist --target bun --format esm --external @ast-grep/napi
          bun build src/cli/index.ts --outdir dist/cli --target bun --format esm --external @ast-grep/napi
          bunx tsc --emitDeclarationOnly
          bun run build:schema

      - name: Publish main package
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG_ARG=""
          if [ -n "${{ steps.version.outputs.dist_tag }}" ]; then
            TAG_ARG="--tag ${{ steps.version.outputs.dist_tag }}"
          fi
          npm publish --access public --provenance $TAG_ARG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Git commit and tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json assets/matrixx.schema.json packages/*/package.json || true
          git diff --cached --quiet || git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag -f "v${{ steps.version.outputs.version }}"
          git push origin --tags --force
          git push origin HEAD || echo "Branch push failed (non-critical)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-platform:
    runs-on: ubuntu-latest
    needs: publish-main
    if: inputs.skip_platform != true
    steps:
      - name: Trigger platform publish workflow
        run: |
          gh workflow run publish-platform.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref }} \
            -f version=${{ needs.publish-main.outputs.version }} \
            -f dist_tag=${{ needs.publish-main.outputs.dist_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: publish-main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.publish-main.outputs.version }}"
          
          PREV_TAG=""
          if [[ "$VERSION" == *"-beta."* ]]; then
            BASE="${VERSION%-beta.*}"
            NUM="${VERSION##*-beta.}"
            PREV_NUM=$((NUM - 1))
            if [ $PREV_NUM -ge 1 ]; then
              PREV_TAG="${BASE}-beta.${PREV_NUM}"
              git rev-parse "v${PREV_TAG}" >/dev/null 2>&1 || PREV_TAG=""
            fi
          fi
          
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(curl -s https://registry.npmjs.org/opencode-matrixx/latest | jq -r '.version // "0.0.0"' 2>/dev/null || echo "0.0.0")
          fi
          
          echo "Comparing v${PREV_TAG}..v${VERSION}"
          
          # Get all commits between tags
          COMMITS=$(git log "v${PREV_TAG}..v${VERSION}" --format="%s" 2>/dev/null || echo "")
          
          # Initialize sections
          FEATURES=""
          FIXES=""
          REFACTOR=""
          DOCS=""
          OTHER=""
          
          # Store regexes in variables for bash 5.2+ compatibility
          # (bash 5.2 changed how parentheses are parsed inside [[ =~ ]])
          re_skip='^(chore|ci|release|test|ignore)'
          re_feat_scoped='^feat\(([^)]+)\): (.+)$'
          re_fix_scoped='^fix\(([^)]+)\): (.+)$'
          re_refactor_scoped='^refactor\(([^)]+)\): (.+)$'
          re_docs_scoped='^docs\(([^)]+)\): (.+)$'
          
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            # Skip chore, ci, release, test commits
            [[ "$commit" =~ $re_skip ]] && continue
            
            if [[ "$commit" =~ ^feat ]]; then
              # Extract scope and message: feat(scope): message -> **scope**: message
              if [[ "$commit" =~ $re_feat_scoped ]]; then
                FEATURES="${FEATURES}\n- **${BASH_REMATCH[1]}**: ${BASH_REMATCH[2]}"
              else
                MSG="${commit#feat: }"
                FEATURES="${FEATURES}\n- ${MSG}"
              fi
            elif [[ "$commit" =~ ^fix ]]; then
              if [[ "$commit" =~ $re_fix_scoped ]]; then
                FIXES="${FIXES}\n- **${BASH_REMATCH[1]}**: ${BASH_REMATCH[2]}"
              else
                MSG="${commit#fix: }"
                FIXES="${FIXES}\n- ${MSG}"
              fi
            elif [[ "$commit" =~ ^refactor ]]; then
              if [[ "$commit" =~ $re_refactor_scoped ]]; then
                REFACTOR="${REFACTOR}\n- **${BASH_REMATCH[1]}**: ${BASH_REMATCH[2]}"
              else
                MSG="${commit#refactor: }"
                REFACTOR="${REFACTOR}\n- ${MSG}"
              fi
            elif [[ "$commit" =~ ^docs ]]; then
              if [[ "$commit" =~ $re_docs_scoped ]]; then
                DOCS="${DOCS}\n- **${BASH_REMATCH[1]}**: ${BASH_REMATCH[2]}"
              else
                MSG="${commit#docs: }"
                DOCS="${DOCS}\n- ${MSG}"
              fi
            else
              OTHER="${OTHER}\n- ${commit}"
            fi
          done <<< "$COMMITS"
          
          # Build release notes
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo -e "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo -e "$FIXES"
              echo ""
            fi
            if [ -n "$REFACTOR" ]; then
              echo "### Refactoring"
              echo -e "$REFACTOR"
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo -e "$DOCS"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo -e "$OTHER"
              echo ""
            fi
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v${PREV_TAG}...v${VERSION}"
          } > /tmp/changelog.md
          
          cat /tmp/changelog.md

      - name: Create GitHub release
        run: |
          VERSION="${{ needs.publish-main.outputs.version }}"
          gh release view "v${VERSION}" >/dev/null 2>&1 || \
            gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/changelog.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete draft release
        run: gh release delete next --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to master
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ needs.publish-main.outputs.version }}"
          git stash --include-untracked || true
          git checkout master
          git reset --hard "v${VERSION}"
          git push -f origin master || echo "::warning::Failed to push to master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
